# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────
# Ce workflow se déclenche à chaque push sur la branche main.
# Il build le projet Vite et déploie le résultat sur GitHub Pages.
# ─────────────────────────────────────────────────────────────

name: Deploy HaikuBot to GitHub Pages

on:
  push:
    branches: [main]          # déclenché à chaque push sur main
  workflow_dispatch:          # permet aussi un déclenchement manuel

# Permissions nécessaires pour écrire sur GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# On n'autorise qu'un seul déploiement à la fois
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du dépôt
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installe Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Installe les dépendances npm
      - name: Install dependencies
        run: npm ci

      # 4. Build Vite → génère le dossier dist/
      - name: Build
        run: npm run build

      # 5. Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. Upload le dossier dist/ comme artifact Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 7. Déploie sur GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
